<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>weather</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <div class="header-container">
        <div class="search-container">
          <form action="">
            <span class="material-symbols-outlined search-icon"> search </span>
            <input
              type="text"
              name="search-bar"
              id="search-bar"
              list="suggestions"
              placeholder="Search your area.."
            />
            <datalist id="suggestions"></datalist>
          </form>

          <button class="my-location">
            <span class="material-symbols-outlined" id="location-icon">
              explore_nearby
            </span>
          </button>

          <button class="unit-toggle">°F</button>
        </div>

        <div class="location">
          <span class="material-symbols-outlined"> location_on </span>
          <p id="locationName"></p>
          <p id="date"></p>
        </div>
      </div>

      <div class="main-content">
        <div class="weather-info-container">
          <div class="temp-info">
            <h1 id="temp"></h1>
            <p id="desc"></p>
          </div>
          <div class="temp-info-cards">
            <div class="info-card">
              <div class="card-title">
                <span class="material-symbols-outlined"> air </span>
                <h2>Wind</h2>
              </div>
              <p id="wind"></p>
            </div>
            <div class="info-card">
              <div class="card-title">
                <span class="material-symbols-outlined"> humidity_low </span>
                <h2>Humidity</h2>
              </div>
              <p id="humidity"></p>
            </div>
          </div>
        </div>

        <div class="hourly-card">
          <div class="hourly-list"></div>
        </div>
      </div>

      <div class="weather-by-day-container"></div>
    </div>

    <footer class="credits">
      Background photo by
      <a
        href="https://unsplash.com/es/fotos/montana-rocosa-bajo-el-cielo-gris-durante-el-dia-v6SaSuhC6kc"
        target="_blank"
        >Timothy Salter-Hewitt</a
      >
      on Unsplash
    </footer>
  </body>
</html>
